<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estante Pessoal | Livros</title>
    <link rel="stylesheet" href="../src/vendor/tabler/dist/css/tabler.min.css">
    <link rel="stylesheet" href="../src/assets/css/global.css">
    <link rel="stylesheet" href="../src/assets/css/custom.css">
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="app-sidebar"></aside>
      <main class="app-main">
        <header class="page-header">
          <div class="page-heading">
            <p class="page-kicker">Cadastro</p>
            <h1 class="page-title">Livros</h1>
            <p class="page-description">Gerencie os livros cadastrados na sua estante.</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" type="button" id="addBookButton">Adicionar Livro +</button>
          </div>
        </header>

        <section class="content-section" aria-label="Lista de livros">
          <article class="card table-card">
            <header class="card-header">
              <h2 class="card-title">Livros cadastrados</h2>
            </header>
            <div class="table-responsive">
              <table class="table table-vcenter">
                <thead>
                  <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Categoria</th>
                    <th>Ano</th>
                    <th>Status</th>
                    <th class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody id="booksTable"></tbody>
              </table>
            </div>
          </article>
        </section>

        <section class="modal fade" id="bookModal" tabindex="-1" aria-labelledby="bookFormTitle" aria-hidden="true">
          <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
              <header class="modal-header">
                <h2 class="modal-title" id="bookFormTitle">Novo livro</h2>
                <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Fechar"></button>
              </header>
              <form id="bookForm" class="modal-body modal-form form-grid">
                <input type="hidden" id="bookId">
                <div class="form-field-wide">
                  <label class="form-label" for="bookTitle">Título</label>
                  <input class="form-control" id="bookTitle" name="title" type="text" required>
                </div>
                <div>
                  <label class="form-label" for="bookAuthorId">Autor</label>
                  <select class="form-select" id="bookAuthorId" name="authorId" required></select>
                </div>
                <div>
                  <label class="form-label" for="bookCategoryId">Categoria</label>
                  <select class="form-select" id="bookCategoryId" name="categoryId" required></select>
                </div>
                <div>
                  <label class="form-label" for="bookStatus">Status</label>
                  <select class="form-select" id="bookStatus" name="status" required></select>
                </div>
                <div>
                  <label class="form-label" for="bookPublishedYear">Ano</label>
                  <input class="form-control" id="bookPublishedYear" name="publishedYear" type="number" min="0" max="2100" required>
                </div>
                <footer class="modal-footer form-actions form-field-wide">
                  <button class="btn btn-primary" type="submit">Salvar</button>
                  <button class="btn btn-outline-secondary" type="button" id="bookCancelButton">Cancelar</button>
                </footer>
              </form>
            </div>
          </div>
        </section>

        <footer class="app-footer">
          <span>Estante Pessoal</span>
          <span>Livros organizados para consulta e empréstimos.</span>
        </footer>
      </main>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="../src/vendor/tabler/dist/js/tabler.min.js" defer></script>
    <script type="module" src="../src/js/controllers/bookController.js"></script>
  </body>
</html>
