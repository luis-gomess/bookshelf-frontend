<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estante Pessoal | Autores</title>
    <link rel="stylesheet" href="../src/vendor/tabler/dist/css/tabler.min.css">
    <link rel="stylesheet" href="../src/assets/css/global.css">
    <link rel="stylesheet" href="../src/assets/css/custom.css">
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="app-sidebar"></aside>
      <main class="app-main">
        <header class="page-header">
          <div class="page-heading">
            <p class="page-kicker">Cadastro</p>
            <h1 class="page-title">Autores</h1>
            <p class="page-description">Organize os autores dos livros da sua estante.</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" type="button" id="addAuthorButton">Adicionar Autor +</button>
          </div>
        </header>

        <section class="content-section" aria-label="Lista de autores">
          <article class="card table-card">
            <header class="card-header">
              <h2 class="card-title">Autores cadastrados</h2>
            </header>
            <div class="table-responsive">
              <table class="table table-vcenter">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>País</th>
                    <th class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody id="authorsTable"></tbody>
              </table>
            </div>
          </article>
        </section>

        <section class="modal fade" id="authorModal" tabindex="-1" aria-labelledby="authorFormTitle" aria-hidden="true">
          <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
              <header class="modal-header">
                <h2 class="modal-title" id="authorFormTitle">Novo autor</h2>
                <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Fechar"></button>
              </header>
              <form id="authorForm" class="modal-body modal-form form-grid">
                <input type="hidden" id="authorId">
                <div>
                  <label class="form-label" for="authorName">Nome</label>
                  <input class="form-control" id="authorName" name="name" type="text" required>
                </div>
                <div>
                  <label class="form-label" for="authorCountry">País</label>
                  <input class="form-control" id="authorCountry" name="country" type="text" required>
                </div>
                <footer class="modal-footer form-actions form-field-wide">
                  <button class="btn btn-primary" type="submit">Salvar</button>
                  <button class="btn btn-outline-secondary" type="button" id="authorCancelButton">Cancelar</button>
                </footer>
              </form>
            </div>
          </div>
        </section>

        <footer class="app-footer">
          <span>Estante Pessoal</span>
          <span>Autores disponíveis para associação aos livros.</span>
        </footer>
      </main>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="../src/vendor/tabler/dist/js/tabler.min.js" defer></script>
    <script type="module" src="../src/js/controllers/authorController.js"></script>
  </body>
</html>
